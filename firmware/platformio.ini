[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.31
    bblanchon/ArduinoJson@^6.21.3
    links2004/WebSockets@^2.4.1
    lvgl/lvgl@^8.3.9
    esphome/ESP32-audioI2S@^2.1.0
    greiman/SdFat@^2.2.3

build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=14
    -DTFT_DC=21
    -DTFT_RST=4
    -DTOUCH_CS=13
    -DSPI_TOUCH_FREQUENCY=2000000
    -DTFT_INVERSION_ON=1
    -DTFT_RGB_ORDER=TFT_BGR
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=20000000
    -DLV_CONF_SKIP=1
    -DLV_TICK_CUSTOM=0
    -DLV_COLOR_DEPTH=16
    -DLV_COLOR_16_SWAP=0
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_BTN=1
